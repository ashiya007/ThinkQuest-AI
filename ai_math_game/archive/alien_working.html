<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛸 Alien Math Blaster - Working Version</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
        
        canvas {
            border: 2px solid #333;
            background: linear-gradient(to bottom, #000428, #1a237e);
            display: block;
            margin: 0 auto;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            background: #333;
            padding: 15px;
            border-radius: 10px;
        }
        
        .stat {
            text-align: center;
        }
        
        .target {
            font-size: 32px;
            font-weight: bold;
            color: #4caf50;
            margin: 20px 0;
        }
        
        .btn {
            padding: 10px 20px;
            margin: 5px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn:hover {
            background: #1976d2;
        }
        
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛸 Alien Math Blaster</h1>
        
        <div class="target">Target: <span id="targetNumber">7</span></div>
        
        <div class="stats">
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Lives: <span id="lives">3</span></div>
            <div class="stat">Accuracy: <span id="accuracy">100%</span></div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div>
            <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>
            <button class="btn" id="pauseBtn" onclick="pauseGame()" disabled>Pause</button>
            <button class="btn" onclick="resetGame()">Reset</button>
        </div>
        
        <div style="margin-top: 20px; background: #333; padding: 15px; border-radius: 10px;">
            <strong>Controls:</strong> Arrow keys to move cannon, Spacebar to shoot
        </div>
    </div>

    <script>
        class AlienGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // Game state
                this.isRunning = false;
                this.isPaused = false;
                this.gameOver = false;
                this.score = 0;
                this.lives = 3;
                this.shotsFired = 0;
                this.shotsHit = 0;
                this.targetNumber = 7;
                
                // Game objects
                this.aliens = [];
                this.lasers = [];
                this.explosions = [];
                
                // Player cannon
                this.cannon = {
                    x: 400,
                    y: 360,
                    width: 40,
                    height: 20,
                    speed: 8
                };
                
                // Timers
                this.alienSpawnTimer = 0;
                this.alienSpawnInterval = 120;
                
                this.init();
            }
            
            init() {
                this.setupEventListeners();
                this.generateNewTarget();
                this.gameLoop();
            }
            
            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    if (!this.isRunning || this.isPaused || this.gameOver) return;
                    
                    switch(e.key) {
                        case 'ArrowLeft':
                            this.cannon.x = Math.max(20, this.cannon.x - this.cannon.speed);
                            break;
                        case 'ArrowRight':
                            this.cannon.x = Math.min(this.canvas.width - 20, this.cannon.x + this.cannon.speed);
                            break;
                        case ' ':
                            e.preventDefault();
                            this.fireLaser();
                            break;
                    }
                });
            }
            
            generateNewTarget() {
                this.targetNumber = Math.floor(Math.random() * 20) + 1;
                document.getElementById('targetNumber').textContent = this.targetNumber;
            }
            
            generateAlienExpression() {
                const operations = ['+', '-'];
                const op = operations[Math.floor(Math.random() * operations.length)];
                
                let a, b;
                if (op === '+') {
                    a = Math.floor(Math.random() * this.targetNumber);
                    b = this.targetNumber - a;
                } else {
                    a = this.targetNumber + Math.floor(Math.random() * 5) + 1;
                    b = a - this.targetNumber;
                }
                
                return `${a} ${op} ${b}`;
            }
            
            spawnAlien() {
                const expression = this.generateAlienExpression();
                const isCorrect = this.evaluateExpression(expression);
                
                this.aliens.push({
                    x: -60,
                    y: 30 + Math.random() * 150,
                    width: 50,
                    height: 30,
                    speed: 1.5 + Math.random() * 1.5,
                    expression: expression,
                    isCorrect: isCorrect,
                    color: isCorrect ? '#4caf50' : '#f44336'
                });
            }
            
            fireLaser() {
                this.lasers.push({
                    x: this.cannon.x,
                    y: this.cannon.y - 20,
                    width: 4,
                    height: 15,
                    speed: 12
                });
                this.shotsFired++;
            }
            
            evaluateExpression(expression) {
                try {
                    const parts = expression.split(' ');
                    if (parts.length === 3) {
                        const a = parseInt(parts[0]);
                        const op = parts[1];
                        const b = parseInt(parts[2]);
                        
                        switch(op) {
                            case '+': return a + b;
                            case '-': return a - b;
                            default: return 0;
                        }
                    }
                    return 0;
                } catch (error) {
                    console.error('Expression evaluation error:', error);
                    return 0;
                }
            }
            
            checkCollision(obj1, obj2) {
                return obj1.x < obj2.x + obj2.width &&
                       obj1.x + obj1.width > obj2.x &&
                       obj1.y < obj2.y + obj2.height &&
                       obj1.y + obj1.height > obj2.y;
            }
            
            update() {
                if (!this.isRunning || this.isPaused || this.gameOver) return;
                
                // Update aliens
                for (let i = this.aliens.length - 1; i >= 0; i--) {
                    const alien = this.aliens[i];
                    alien.x += alien.speed;
                    
                    // Remove off-screen aliens
                    if (alien.x > this.canvas.width + 100) {
                        this.aliens.splice(i, 1);
                        continue;
                    }
                    
                    // Check collision with lasers
                    for (let j = this.lasers.length - 1; j >= 0; j--) {
                        const laser = this.lasers[j];
                        
                        if (this.checkCollision(laser, alien)) {
                            this.createExplosion(alien.x + alien.width/2, alien.y + alien.height/2);
                            
                            if (alien.isCorrect) {
                                this.score += 10;
                                this.shotsHit++;
                                this.generateNewTarget();
                                this.clearAllAliens();
                                this.spawnNewAlienSet();
                            } else {
                                this.lives--;
                                if (this.lives <= 0) {
                                    this.endGame();
                                    return;
                                }
                            }
                            
                            this.lasers.splice(j, 1);
                            this.aliens.splice(i, 1);
                            this.updateStats();
                            break;
                        }
                    }
                }
                
                // Update lasers
                for (let i = this.lasers.length - 1; i >= 0; i--) {
                    const laser = this.lasers[i];
                    laser.y -= laser.speed;
                    
                    if (laser.y < 0) {
                        this.lasers.splice(i, 1);
                    }
                }
                
                // Update explosions
                for (let i = this.explosions.length - 1; i >= 0; i--) {
                    const explosion = this.explosions[i];
                    explosion.radius += 2;
                    explosion.alpha -= 0.05;
                    
                    if (explosion.alpha <= 0) {
                        this.explosions.splice(i, 1);
                    }
                }
                
                // Spawn new aliens
                this.alienSpawnTimer++;
                if (this.alienSpawnTimer >= this.alienSpawnInterval && this.aliens.length < 4) {
                    this.spawnAlien();
                    this.alienSpawnTimer = 0;
                }
            }
            
            clearAllAliens() {
                this.aliens = [];
            }
            
            spawnNewAlienSet() {
                for (let i = 0; i < 4; i++) {
                    setTimeout(() => {
                        this.spawnAlien();
                    }, i * 500);
                }
            }
            
            createExplosion(x, y) {
                this.explosions.push({
                    x: x,
                    y: y,
                    radius: 10,
                    alpha: 1
                });
            }
            
            render() {
                // Clear canvas
                this.ctx.fillStyle = '#000428';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw stars
                for (let i = 0; i < 30; i++) {
                    this.ctx.fillStyle = 'white';
                    this.ctx.globalAlpha = Math.random() * 0.8 + 0.2;
                    this.ctx.fillRect(
                        Math.random() * this.canvas.width,
                        Math.random() * this.canvas.height,
                        2, 2
                    );
                }
                this.ctx.globalAlpha = 1;
                
                // Draw aliens
                this.aliens.forEach(alien => {
                    // UFO body
                    this.ctx.fillStyle = alien.color;
                    this.ctx.beginPath();
                    this.ctx.ellipse(alien.x + alien.width/2, alien.y + alien.height/2, alien.width/2, alien.height/2, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // UFO dome
                    this.ctx.fillStyle = alien.isCorrect ? '#81c784' : '#ef5350';
                    this.ctx.beginPath();
                    this.ctx.ellipse(alien.x + alien.width/2, alien.y + alien.height/2 - 5, alien.width/3, alien.height/3, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // Expression
                    this.ctx.fillStyle = 'white';
                    this.ctx.font = 'bold 14px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText(alien.expression, alien.x + alien.width/2, alien.y + alien.height/2 + 5);
                });
                
                // Draw lasers
                this.ctx.fillStyle = '#ff0000';
                this.lasers.forEach(laser => {
                    this.ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
                });
                
                // Draw explosions
                this.explosions.forEach(explosion => {
                    this.ctx.strokeStyle = `rgba(255, 165, 0, ${explosion.alpha})`;
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.arc(explosion.x, explosion.y, explosion.radius, 0, Math.PI * 2);
                    this.ctx.stroke();
                });
                
                // Draw cannon
                this.ctx.fillStyle = '#2196f3';
                this.ctx.fillRect(this.cannon.x - 20, this.cannon.y - 10, 40, 20);
                
                // Cannon barrel
                this.ctx.fillStyle = '#1976d2';
                this.ctx.fillRect(this.cannon.x - 3, this.cannon.y - 20, 6, 15);
                
                // Game state text
                if (!this.isRunning && !this.gameOver) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.ctx.fillStyle = 'white';
                    this.ctx.font = 'bold 32px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('Press Start to Begin!', this.canvas.width/2, this.canvas.height/2);
                }
                
                if (this.gameOver) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.ctx.fillStyle = 'white';
                    this.ctx.font = 'bold 48px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('GAME OVER', this.canvas.width/2, this.canvas.height/2);
                    this.ctx.font = 'bold 24px Arial';
                    this.ctx.fillText(`Final Score: ${this.score}`, this.canvas.width/2, this.canvas.height/2 + 50);
                }
            }
            
            gameLoop() {
                this.update();
                this.render();
                requestAnimationFrame(() => this.gameLoop());
            }
            
            updateStats() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('lives').textContent = this.lives;
                
                const accuracy = this.shotsFired > 0 ? 
                    Math.round((this.shotsHit / this.shotsFired) * 100) : 100;
                document.getElementById('accuracy').textContent = `${accuracy}%`;
            }
            
            startGame() {
                if (this.isRunning) return;
                
                this.isRunning = true;
                this.isPaused = false;
                this.gameOver = false;
                this.score = 0;
                this.lives = 3;
                this.shotsFired = 0;
                this.shotsHit = 0;
                this.aliens = [];
                this.lasers = [];
                this.explosions = [];
                this.alienSpawnTimer = 0;
                
                this.generateNewTarget();
                this.spawnNewAlienSet();
                
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                this.updateStats();
            }
            
            pauseGame() {
                if (!this.isRunning || this.gameOver) return;
                this.isPaused = !this.isPaused;
                document.getElementById('pauseBtn').textContent = this.isPaused ? 'Resume' : 'Pause';
            }
            
            resetGame() {
                this.isRunning = false;
                this.isPaused = false;
                this.gameOver = false;
                
                this.score = 0;
                this.lives = 3;
                this.shotsFired = 0;
                this.shotsHit = 0;
                this.aliens = [];
                this.lasers = [];
                this.explosions = [];
                this.alienSpawnTimer = 0;
                
                this.generateNewTarget();
                
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('pauseBtn').textContent = 'Pause';
                this.updateStats();
            }
            
            endGame() {
                this.gameOver = true;
                this.isRunning = false;
                
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
            }
        }
        
        let game;
        
        function startGame() {
            if (game) game.startGame();
        }
        
        function pauseGame() {
            if (game) game.pauseGame();
        }
        
        function resetGame() {
            if (game) game.resetGame();
        }
        
        // Initialize game
        window.addEventListener('DOMContentLoaded', () => {
            game = new AlienGame();
        });
    </script>
</body>
</html>
