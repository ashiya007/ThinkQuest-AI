<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Alien Blaster - Simple Version</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        
        canvas {
            border: 2px solid #333;
            background: linear-gradient(to bottom, #000428, #1a237e);
        }
        
        .controls {
            margin: 20px 0;
        }
        
        .btn {
            padding: 10px 20px;
            margin: 0 10px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .info {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛸 Test Alien Blaster</h1>
        
        <div class="info">
            <p><strong>Target:</strong> <span id="targetNumber">7</span></p>
            <p><strong>Score:</strong> <span id="score">0</span></p>
            <p><strong>Lives:</strong> <span id="lives">3</span></p>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="controls">
            <button class="btn" onclick="startGame()">Start Game</button>
            <button class="btn" onclick="resetGame()">Reset</button>
        </div>
    </div>

    <script>
        class SimpleAlienGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // Game state
                this.isRunning = false;
                this.score = 0;
                this.lives = 3;
                this.targetNumber = 7;
                
                // Game objects
                this.aliens = [];
                this.lasers = [];
                
                // Player cannon
                this.cannon = {
                    x: 400,
                    y: 350,
                    width: 40,
                    height: 30
                };
                
                this.init();
            }
            
            init() {
                this.setupEventListeners();
                this.gameLoop();
            }
            
            setupEventListeners() {
                // Keyboard controls
                document.addEventListener('keydown', (e) => {
                    if (!this.isRunning) return;
                    
                    if (e.key === 'ArrowLeft') {
                        this.cannon.x = Math.max(20, this.cannon.x - 10);
                    } else if (e.key === 'ArrowRight') {
                        this.cannon.x = Math.min(760, this.cannon.x + 10);
                    } else if (e.key === ' ') {
                        this.fireLaser();
                    }
                });
                
                // Mouse controls
                this.canvas.addEventListener('click', (e) => {
                    if (!this.isRunning) return;
                    const rect = this.canvas.getBoundingClientRect();
                    this.cannon.x = e.clientX - rect.left;
                    this.fireLaser();
                });
            }
            
            spawnAlien() {
                // Simple predefined aliens for testing
                const alienData = [
                    { expression: "3 + 4", isCorrect: true },
                    { expression: "5 + 2", isCorrect: true },
                    { expression: "8 - 1", isCorrect: false },
                    { expression: "6 + 1", isCorrect: false },
                    { expression: "2 + 5", isCorrect: true }
                ];
                
                const randomAlien = alienData[Math.floor(Math.random() * alienData.length)];
                
                this.aliens.push({
                    x: -60, // Start from left side of screen
                    y: Math.random() * 100 + 50, // Random height
                    width: 60,
                    height: 30,
                    speed: 1 + Math.random() * 2, // Move right
                    expression: randomAlien.expression,
                    isCorrect: randomAlien.isCorrect,
                    color: randomAlien.isCorrect ? '#4caf50' : '#f44336'
                });
            }
            
            fireLaser() {
                this.lasers.push({
                    x: this.cannon.x,
                    y: this.cannon.y - 20,
                    width: 4,
                    height: 10,
                    speed: 8
                });
            }
            
            update() {
                if (!this.isRunning) return;
                
                // Update aliens
                for (let i = this.aliens.length - 1; i >= 0; i--) {
                    const alien = this.aliens[i];
                    alien.y += alien.speed;
                    
                    // Remove off-screen aliens
                    if (alien.y > 450) {
                        this.aliens.splice(i, 1);
                        continue;
                    }
                    
                    // Check collision with lasers
                    for (let j = this.lasers.length - 1; j >= 0; j--) {
                        const laser = this.lasers[j];
                        
                        if (this.checkCollision(laser, alien)) {
                            if (alien.isCorrect) {
                                this.score += 10;
                                this.showFeedback('Correct! +10', 'success');
                            } else {
                                this.lives--;
                                this.showFeedback('Wrong! -1 life', 'error');
                            }
                            
                            // Remove both laser and alien
                            this.lasers.splice(j, 1);
                            this.aliens.splice(i, 1);
                            this.updateStats();
                            break;
                        }
                    }
                }
                
                // Update lasers
                for (let i = this.lasers.length - 1; i >= 0; i--) {
                    const laser = this.lasers[i];
                    laser.y -= laser.speed;
                    
                    if (laser.y < 0) {
                        this.lasers.splice(i, 1);
                    }
                }
                
                // Spawn new aliens
                if (Math.random() < 0.02) {
                    this.spawnAlien();
                }
            }
            
            checkCollision(obj1, obj2) {
                return obj1.x < obj2.x + obj2.width &&
                       obj1.x + obj1.width > obj2.x &&
                       obj1.y < obj2.y + obj2.height &&
                       obj1.y + obj1.height > obj2.y;
            }
            
            render() {
                // Clear canvas
                this.ctx.fillStyle = '#000428';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw stars
                for (let i = 0; i < 30; i++) {
                    this.ctx.fillStyle = 'white';
                    this.ctx.globalAlpha = Math.random() * 0.5 + 0.5;
                    this.ctx.fillRect(
                        Math.random() * this.canvas.width,
                        Math.random() * this.canvas.height,
                        2, 2
                    );
                }
                this.ctx.globalAlpha = 1;
                
                // Draw aliens
                this.aliens.forEach(alien => {
                    this.ctx.fillStyle = alien.color;
                    this.ctx.fillRect(alien.x, alien.y, alien.width, alien.height);
                    
                    // Draw expression
                    this.ctx.fillStyle = 'white';
                    this.ctx.font = 'bold 14px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText(alien.expression, alien.x + alien.width/2, alien.y + alien.height/2);
                });
                
                // Draw lasers
                this.ctx.fillStyle = '#ff0000';
                this.lasers.forEach(laser => {
                    this.ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
                });
                
                // Draw cannon
                this.ctx.fillStyle = '#2196f3';
                this.ctx.fillRect(this.cannon.x - 20, this.cannon.y - 15, 40, 30);
            }
            
            gameLoop() {
                this.update();
                this.render();
                requestAnimationFrame(() => this.gameLoop());
            }
            
            updateStats() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('lives').textContent = this.lives;
                document.getElementById('targetNumber').textContent = this.targetNumber;
            }
            
            showFeedback(message, type) {
                console.log(message);
            }
            
            startGame() {
                this.isRunning = true;
                this.score = 0;
                this.lives = 3;
                this.aliens = [];
                this.lasers = [];
                
                // Spawn initial aliens
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => this.spawnAlien(), i * 1000);
                }
                
                this.updateStats();
            }
            
            resetGame() {
                this.isRunning = false;
                this.score = 0;
                this.lives = 3;
                this.aliens = [];
                this.lasers = [];
                this.updateStats();
            }
        }
        
        let game;
        
        function startGame() {
            if (game) game.startGame();
        }
        
        function resetGame() {
            if (game) game.resetGame();
        }
        
        // Initialize game when page loads
        window.addEventListener('DOMContentLoaded', () => {
            game = new SimpleAlienGame();
        });
    </script>
</body>
</html>
