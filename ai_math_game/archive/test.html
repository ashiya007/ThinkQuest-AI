<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Math Learning Game - Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #2d3748;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 AI Math Learning Game - Test Version</h1>
        
        <div class="form-group">
            <label for="studentId">Student ID:</label>
            <input type="text" id="studentId" placeholder="Enter your student ID">
        </div>
        
        <div class="form-group">
            <label for="studentClass">Class:</label>
            <select id="studentClass">
                <option value="">Select your class</option>
                <option value="1">Class 1</option>
                <option value="2">Class 2</option>
                <option value="3">Class 3</option>
                <option value="4">Class 4</option>
                <option value="5">Class 5</option>
            </select>
        </div>
        
        <button onclick="registerStudent()">Register & Continue</button>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        async function registerStudent() {
            const studentId = document.getElementById('studentId').value.trim();
            const studentClass = document.getElementById('studentClass').value;
            const messageDiv = document.getElementById('message');
            
            // Validation
            if (!studentId || !studentClass) {
                showMessage('Please enter both Student ID and Class', 'error');
                return;
            }
            
            try {
                showMessage('Registering...', 'success');
                
                const response = await fetch('/api/register_student', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        student_id: studentId,
                        class: parseInt(studentClass)
                    })
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showMessage(`✅ Registration successful! Welcome ${studentId}!`, 'success');
                    setTimeout(() => {
                        window.location.href = '/puzzle.html';
                    }, 2000);
                } else {
                    showMessage(`❌ Registration failed: ${result.error || 'Unknown error'}`, 'error');
                }
                
            } catch (error) {
                console.error('Registration error:', error);
                showMessage(`❌ Network error: ${error.message}`, 'error');
            }
        }
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }
        
        // Test API connection on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/get_operations');
                const result = await response.json();
                console.log('API Test Result:', result);
                if (response.ok) {
                    showMessage('✅ Server connection successful!', 'success');
                }
            } catch (error) {
                showMessage('❌ Server connection failed', 'error');
            }
        });
    </script>
</body>
</html>
