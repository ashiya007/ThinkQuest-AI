<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kangaroo Hop</title>
    <link rel="stylesheet" href="kangaroo.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
</head>

<body>
    <div id="game-wrapper">
        <div id="game-hud">
            <div class="hud-item">TIME: <span id="timer-val">00:00</span></div>
            <div class="hud-item">RATE: <span id="rate-val">0</span>/min</div>
        </div>

        <div id="game-container"></div>

        <div id="start-screen">
            <button id="start-btn">PLAY NOW</button>
        </div>

        <div id="countdown" class="hidden">3</div>
        <div id="shape-prompt-label" class="hidden">loading...</div>

        <div id="results-overlay" class="hidden">
            <div class="results-content">
                <h2 id="results-title">Game Results</h2>
                <table class="leaderboard">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Name</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
                <div class="stat-box">
                    <span class="label">Accuracy</span>
                    <span id="accuracy-val">0%</span>
                </div>
                <div class="missed-container">
                    <h3>Missed Questions</h3>
                    <div id="missed-list"></div>
                </div>
                <button onclick="location.reload()" class="play-again-btn">PLAY AGAIN</button>
            </div>
        </div>
    </div>
    <script src="kang_game.js"></script>
</body>

</html>
