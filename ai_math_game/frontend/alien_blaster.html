<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛸 Alien Math Blaster - ThinkQuest AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
        }

        .page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 8px 16px;
            gap: 8px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .top-bar h1 {
            font-size: 20px;
        }

        .top-bar a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 14px;
        }

        /* Main row */
        .game-row {
            display: flex;
            gap: 12px;
            flex: 1;
            min-height: 0;
        }

        .canvas-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* Target banner */
        .target-banner {
            background: linear-gradient(135deg, #e53e3e, #c53030);
            padding: 8px 16px;
            border-radius: 10px 10px 0 0;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            flex-shrink: 0;
            display: none;
        }

        .target-banner .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            display: block;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 0 0 10px 10px;
            background: linear-gradient(to bottom, #000428, #1a237e);
        }

        /* Sidebar */
        .sidebar {
            flex: 0 0 240px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 14px;
        }

        .card h3 {
            font-size: 13px;
            margin-bottom: 6px;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }

        .stat-box {
            text-align: center;
            padding: 4px;
        }

        .stat-box .val {
            font-size: 18px;
            font-weight: bold;
            color: #00ffff;
        }

        .stat-box .lbl {
            font-size: 9px;
            text-transform: uppercase;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        .diff-badge {
            text-align: center;
            padding: 6px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .diff-easy {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }

        .diff-medium {
            background: rgba(236, 201, 75, 0.2);
            color: #ecc94b;
        }

        .diff-hard {
            background: rgba(245, 101, 101, 0.2);
            color: #f56565;
        }

        .instructions {
            font-size: 11px;
            line-height: 1.5;
            opacity: 0.8;
        }

        .instructions ul {
            padding-left: 16px;
            margin: 0;
        }

        /* Buttons */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            color: white;
            transition: all 0.2s;
        }

        .btn-start {
            background: linear-gradient(135deg, #48bb78, #38a169);
        }

        .btn-pause {
            background: linear-gradient(135deg, #ed8936, #dd6b20);
        }

        .btn-reset {
            background: linear-gradient(135deg, #718096, #4a5568);
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Power-up indicators */
        .powerups {
            display: flex;
            gap: 8px;
        }

        .powerup-icon {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0.3;
        }

        .powerup-icon.active {
            opacity: 1;
            background: rgba(0, 255, 255, 0.2);
        }

        /* Feedback */
        .feedback {
            padding: 6px 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            display: none;
        }

        @media (max-width: 900px) {
            .game-row {
                flex-direction: column;
            }

            .sidebar {
                flex: 0 0 auto;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 6px;
            }

            .card {
                flex: 1;
                min-width: 140px;
            }

            .controls {
                flex-direction: row;
            }

            .btn {
                flex: 1;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="top-bar">
            <h1>🛸 Alien Math Blaster</h1>
            <a href="/">← Back to Home</a>
        </div>

        <div class="game-row">
            <div class="canvas-wrap">
                <div class="target-banner" id="targetBanner">
                    <span class="label">Shoot the alien whose expression equals</span>
                    <span id="targetDisplay">?</span>
                </div>
                <canvas id="gameCanvas" width="800" height="500"></canvas>
            </div>

            <div class="sidebar">
                <div class="card">
                    <h3>📊 Stats</h3>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="val" id="score">0</div>
                            <div class="lbl">Score</div>
                        </div>
                        <div class="stat-box">
                            <div class="val" id="lives">5</div>
                            <div class="lbl">Lives</div>
                        </div>
                        <div class="stat-box">
                            <div class="val" id="streak">0</div>
                            <div class="lbl">Streak</div>
                        </div>
                        <div class="stat-box">
                            <div class="val" id="accuracy">100%</div>
                            <div class="lbl">Accuracy</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="diff-badge diff-easy" id="diffBadge">🟢 EASY</div>
                </div>

                <div class="card">
                    <div class="powerups">
                        <span class="powerup-icon" id="shieldIcon">🛡️ Shield</span>
                        <span class="powerup-icon" id="slowIcon">⏳ Slow-Mo</span>
                    </div>
                </div>

                <div class="card instructions">
                    <h3>🎮 Controls</h3>
                    <ul>
                        <li><strong>← →</strong> Move cannon</li>
                        <li><strong>Space</strong> — Shoot!</li>
                        <li>Shoot aliens matching the target number</li>
                        <li>Difficulty adapts to your performance</li>
                    </ul>
                </div>

                <div class="controls">
                    <button class="btn btn-start" id="startBtn" onclick="startGame()">🎮 Start Game</button>
                    <button class="btn btn-pause" id="pauseBtn" onclick="pauseGame()" disabled>⏸️ Pause</button>
                    <button class="btn btn-reset" onclick="resetGame()">🔄 Reset</button>
                </div>

                <div class="feedback" id="feedback"></div>
            </div>
        </div>
    </div>

    <script>
        class AlienGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');

                // Game state
                this.isRunning = false;
                this.isPaused = false;
                this.gameOver = false;
                this.score = 0;
                this.lives = 5;
                this.shotsFired = 0;
                this.shotsHit = 0;
                this.streakCount = 0;
                this.maxStreak = 0;
                this.targetNumber = 0;
                this.questionsAnswered = 0;

                // Game objects
                this.aliens = [];
                this.lasers = [];
                this.explosions = [];
                this.particles = [];
                this.floatingTexts = [];
                this.stars = [];

                // Cannon
                this.cannon = { x: 400, y: 460, width: 40, height: 20, speed: 7 };
                this.keys = {};

                // Spawn
                this.alienSpawnTimer = 0;
                this.alienSpawnInterval = 150;

                // ── Adaptive Difficulty ──
                this.currentDifficulty = 'easy';
                this.consecutiveCorrect = 0;
                this.consecutiveWrong = 0;
                this.difficultyConfig = {
                    easy: { multMin: 1, multMax: 5, alienSpeed: [0.4, 0.8], spawnInterval: 180, points: 10 },
                    medium: { multMin: 2, multMax: 9, alienSpeed: [0.6, 1.2], spawnInterval: 130, points: 20 },
                    hard: { multMin: 4, multMax: 12, alienSpeed: [0.8, 1.6], spawnInterval: 90, points: 35 }
                };

                // Power-ups
                this.hasShield = false;
                this.slowMoActive = false;
                this.slowMoTimer = 0;

                // AI Integration
                this.aiTopic = null;
                this.wrongAnswers = [];
                this.difficultyHistory = ['easy'];
                this.aiHintText = '';
                this.aiHintTimer = 0;
                this.aiReportText = '';
                this.previousQuestions = [];
                this.loadAITopic();

                this.init();
            }

            loadAITopic() {
                try {
                    const cfg = JSON.parse(sessionStorage.getItem('aiTopicConfig') || '{}');
                    if (cfg.topic) {
                        this.aiTopic = cfg;
                        console.log('AI Topic loaded:', cfg);
                    }
                    this.customPrompt = sessionStorage.getItem('aiCustomPrompt') || '';
                } catch (e) { console.log('No AI topic config'); }
            }

            init() {
                this.setupStars();
                this.setupEventListeners();
                this.gameLoop();
            }

            setupStars() {
                for (let i = 0; i < 60; i++) {
                    this.stars.push({
                        x: Math.random() * 800,
                        y: Math.random() * 500,
                        size: Math.random() * 2 + 0.5,
                        speed: Math.random() * 0.3 + 0.1,
                        brightness: Math.random()
                    });
                }
            }

            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if (e.key === ' ') {
                        e.preventDefault();
                        if (this.isRunning && !this.isPaused && !this.gameOver) this.fireLaser();
                    }
                });
                document.addEventListener('keyup', (e) => { this.keys[e.key] = false; });
            }

            // ── ADAPTIVE QUESTION GENERATION ──
            getDiffConfig() {
                return this.difficultyConfig[this.currentDifficulty];
            }

            async fetchAIQuestion() {
                if (!this.aiTopic) return null;
                try {
                    const res = await fetch('/api/ai_question', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            topic: this.aiTopic.topic,
                            subtopic: this.aiTopic.subtopic,
                            difficulty: this.currentDifficulty,
                            previous_questions: this.previousQuestions.slice(-8),
                            custom_prompt: this.customPrompt || ''
                        })
                    });
                    const data = await res.json();
                    if (data.success && data.options && data.options.length >= 4) {
                        this.previousQuestions.push(data.question);
                        return data;
                    }
                } catch (e) { console.error('AI question fetch failed:', e); }
                return null;
            }

            generateTarget() {
                const cfg = this.getDiffConfig();
                const a = Math.floor(Math.random() * (cfg.multMax - cfg.multMin + 1)) + cfg.multMin;
                const b = Math.floor(Math.random() * (cfg.multMax - cfg.multMin + 1)) + cfg.multMin;
                this.targetNumber = a * b;
                this._targetFactorA = a;
                this._targetFactorB = b;
                document.getElementById('targetDisplay').textContent = this.targetNumber;
                this.alienSpawnInterval = cfg.spawnInterval;
            }

            generateExpression(mustBeCorrect) {
                const cfg = this.getDiffConfig();

                if (mustBeCorrect) {
                    // Correct expression: must equal targetNumber
                    // Find factor pairs
                    const pairs = [];
                    for (let i = cfg.multMin; i <= cfg.multMax; i++) {
                        if (this.targetNumber % i === 0) {
                            const j = this.targetNumber / i;
                            if (j >= cfg.multMin && j <= cfg.multMax) {
                                pairs.push([i, j]);
                            }
                        }
                    }
                    if (pairs.length > 0) {
                        const [a, b] = pairs[Math.floor(Math.random() * pairs.length)];
                        return { expr: `${a} × ${b}`, value: a * b, isCorrect: true };
                    }
                    // Fallback
                    return { expr: `${this._targetFactorA} × ${this._targetFactorB}`, value: this.targetNumber, isCorrect: true };
                } else {
                    // Wrong expression: must NOT equal targetNumber
                    let a, b, val;
                    let attempts = 0;
                    do {
                        a = Math.floor(Math.random() * (cfg.multMax - cfg.multMin + 1)) + cfg.multMin;
                        b = Math.floor(Math.random() * (cfg.multMax - cfg.multMin + 1)) + cfg.multMin;
                        val = a * b;
                        attempts++;
                    } while (val === this.targetNumber && attempts < 20);

                    return { expr: `${a} × ${b}`, value: val, isCorrect: val === this.targetNumber };
                }
            }

            // ── ALIEN SPAWNING ──
            async spawnAlienSet() {
                this.aliens = [];
                const lanes = [
                    { x: 80, y: 60 },
                    { x: 280, y: 40 },
                    { x: 480, y: 70 },
                    { x: 680, y: 50 }
                ];

                const cfg = this.getDiffConfig();

                // Try AI question first
                const aiQ = await this.fetchAIQuestion();
                if (aiQ) {
                    // AI question mode: show question as target, options as UFOs
                    this.targetNumber = aiQ.answer;
                    this._currentAIQuestion = aiQ;
                    document.getElementById('targetDisplay').textContent = aiQ.question;

                    const correctIdx = Math.floor(Math.random() * 4);
                    for (let i = 0; i < 4; i++) {
                        const speedRange = cfg.alienSpeed;
                        const speed = speedRange[0] + Math.random() * (speedRange[1] - speedRange[0]);
                        const opt = aiQ.options[i] || '?';
                        this.aliens.push({
                            x: lanes[i].x + (Math.random() - 0.5) * 30,
                            y: -60 - Math.random() * 80,
                            width: 65, height: 35,
                            speed: speed * (this.slowMoActive ? 0.3 : 1),
                            expression: opt,
                            value: opt,
                            isCorrect: (opt === aiQ.answer),
                            hoverOffset: Math.random() * Math.PI * 2,
                            hitFlash: 0,
                            color: `hsl(${Math.random() * 360}, 70%, 50%)`
                        });
                    }
                } else {
                    // Fallback: local multiplication
                    const correctCount = Math.random() < 0.3 ? 2 : 1;
                    const correctLanes = [];
                    while (correctLanes.length < correctCount) {
                        const idx = Math.floor(Math.random() * 4);
                        if (!correctLanes.includes(idx)) correctLanes.push(idx);
                    }
                    for (let i = 0; i < 4; i++) {
                        const isCorrect = correctLanes.includes(i);
                        const exprData = this.generateExpression(isCorrect);
                        const speedRange = cfg.alienSpeed;
                        const speed = speedRange[0] + Math.random() * (speedRange[1] - speedRange[0]);
                        this.aliens.push({
                            x: lanes[i].x + (Math.random() - 0.5) * 30,
                            y: -60 - Math.random() * 80,
                            width: 55, height: 35,
                            speed: speed * (this.slowMoActive ? 0.3 : 1),
                            expression: exprData.expr,
                            value: exprData.value,
                            isCorrect: exprData.isCorrect,
                            hoverOffset: Math.random() * Math.PI * 2,
                            hitFlash: 0,
                            color: `hsl(${Math.random() * 360}, 70%, 50%)`
                        });
                    }
                }
            }

            fireLaser() {
                this.lasers.push({
                    x: this.cannon.x,
                    y: this.cannon.y - 25,
                    width: 4,
                    height: 18,
                    speed: 14
                });
                this.shotsFired++;
            }

            // ── HIT HANDLING ──
            handleCorrectHit(alien) {
                this.shotsHit++;
                this.streakCount++;
                this.maxStreak = Math.max(this.maxStreak, this.streakCount);
                this.consecutiveCorrect++;
                this.consecutiveWrong = 0;
                this.questionsAnswered++;

                // Scoring
                const cfg = this.getDiffConfig();
                const basePoints = cfg.points;
                const streakBonus = Math.min(this.streakCount, 10) * 2;
                const points = basePoints + streakBonus;
                this.score += points;

                // Visual feedback
                this.createExplosion(alien.x + alien.width / 2, alien.y + alien.height / 2, '#48bb78');
                let msg = `+${points}`;
                if (this.streakCount >= 5) msg = `🔥 x${this.streakCount} +${points}`;
                else if (this.streakCount >= 3) msg = `⚡ x${this.streakCount} +${points}`;
                this.addFloatingText(msg, alien.x + alien.width / 2, alien.y, '#48bb78');

                // ── Adaptive: promote after 4 consecutive correct ──
                if (this.consecutiveCorrect >= 4) {
                    this.consecutiveCorrect = 0;
                    if (this.currentDifficulty === 'easy') {
                        this.currentDifficulty = 'medium';
                        this.showFeedback('📈 DIFFICULTY UP → MEDIUM!', '#ecc94b');
                    } else if (this.currentDifficulty === 'medium') {
                        this.currentDifficulty = 'hard';
                        this.showFeedback('📈 DIFFICULTY UP → HARD!', '#f56565');
                    }
                }

                // Power-ups
                if (this.streakCount === 5 && !this.hasShield) {
                    this.hasShield = true;
                    this.showFeedback('🛡️ SHIELD ACTIVATED!', '#00ffff');
                }
                if (this.streakCount === 8) {
                    this.slowMoActive = true;
                    this.slowMoTimer = 300;
                    this.showFeedback('⏳ SLOW-MO ACTIVATED!', '#aa44ff');
                }

                // New round
                this.generateTarget();
                this.spawnAlienSet();
                this.updateStats();
            }

            handleWrongHit(alien) {
                this.consecutiveWrong++;
                this.consecutiveCorrect = 0;
                this.streakCount = 0;
                this.questionsAnswered++;
                this.wrongAnswers.push(`Q: ${this._currentAIQuestion?.question || this.targetNumber}, answered: ${alien.expression}`);

                // Fetch AI hint asynchronously
                this.fetchAIHint(alien);

                // Shield absorbs
                if (this.hasShield) {
                    this.hasShield = false;
                    this.showFeedback('🛡️ SHIELD BLOCKED! No penalty!', '#00ffff');
                    this.addFloatingText('BLOCKED!', alien.x + alien.width / 2, alien.y, '#00ffff');
                    this.createExplosion(alien.x + alien.width / 2, alien.y + alien.height / 2, '#00ffff');
                    // Remove alien but don't penalize
                    this.aliens = this.aliens.filter(a => a !== alien);
                    this.updateStats();
                    return;
                }

                this.lives--;
                this.createExplosion(alien.x + alien.width / 2, alien.y + alien.height / 2, '#f56565');
                this.addFloatingText(`WRONG! = ${alien.value}`, alien.x + alien.width / 2, alien.y, '#f56565');

                // ── Adaptive: demote after 2 consecutive wrong ──
                if (this.consecutiveWrong >= 2) {
                    this.consecutiveWrong = 0;
                    if (this.currentDifficulty === 'hard') {
                        this.currentDifficulty = 'medium';
                        this.showFeedback('📉 DIFFICULTY DOWN → MEDIUM', '#ff4444');
                    } else if (this.currentDifficulty === 'medium') {
                        this.currentDifficulty = 'easy';
                        this.showFeedback('📉 DIFFICULTY DOWN → EASY', '#ff4444');
                    }
                }

                if (this.lives <= 0) {
                    this.endGame();
                    return;
                }

                // Remove alien and respawn set
                this.generateTarget();
                this.spawnAlienSet();
                this.updateStats();
            }

            // ── VISUALS ──
            createExplosion(x, y, color) {
                for (let i = 0; i < 12; i++) {
                    this.particles.push({
                        x: x, y: y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 1,
                        color: color,
                        size: Math.random() * 4 + 2
                    });
                }
                this.explosions.push({ x: x, y: y, radius: 5, alpha: 1 });
            }

            addFloatingText(text, x, y, color) {
                this.floatingTexts.push({ text, x, y, life: 1, color });
            }

            showFeedback(msg, color) {
                const el = document.getElementById('feedback');
                el.textContent = msg;
                el.style.display = 'block';
                el.style.background = color + '33';
                el.style.color = color;
                setTimeout(() => { el.style.display = 'none'; }, 2500);
            }

            // ── UPDATE LOOP ──
            update() {
                if (!this.isRunning || this.isPaused || this.gameOver) return;

                // Cannon movement (smooth)
                if (this.keys['ArrowLeft']) this.cannon.x = Math.max(25, this.cannon.x - this.cannon.speed);
                if (this.keys['ArrowRight']) this.cannon.x = Math.min(775, this.cannon.x + this.cannon.speed);

                // Slow-mo timer
                if (this.slowMoActive) {
                    this.slowMoTimer--;
                    if (this.slowMoTimer <= 0) {
                        this.slowMoActive = false;
                        this.showFeedback('⏳ Slow-mo ended!', '#aaaaaa');
                    }
                }

                const speedMult = this.slowMoActive ? 0.3 : 1;

                // Update aliens
                for (let i = this.aliens.length - 1; i >= 0; i--) {
                    const a = this.aliens[i];
                    a.y += a.speed * speedMult;
                    a.x += Math.sin(Date.now() / 600 + a.hoverOffset) * 0.4;
                    if (a.hitFlash > 0) a.hitFlash--;

                    // Game over if alien reaches cannon
                    if (a.y > this.canvas.height - 60) {
                        this.endGame();
                        return;
                    }
                }

                // Update lasers
                for (let i = this.lasers.length - 1; i >= 0; i--) {
                    const l = this.lasers[i];
                    l.y -= l.speed;
                    if (l.y < -20) { this.lasers.splice(i, 1); continue; }

                    // Check collision with aliens
                    for (let j = this.aliens.length - 1; j >= 0; j--) {
                        const a = this.aliens[j];
                        if (l.x > a.x && l.x < a.x + a.width && l.y > a.y && l.y < a.y + a.height) {
                            this.lasers.splice(i, 1);
                            if (a.value === this.targetNumber) {
                                this.handleCorrectHit(a);
                            } else {
                                this.handleWrongHit(a);
                            }
                            break;
                        }
                    }
                }

                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.life -= 0.025;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }

                // Update explosions
                for (let i = this.explosions.length - 1; i >= 0; i--) {
                    const e = this.explosions[i];
                    e.radius += 2; e.alpha -= 0.04;
                    if (e.alpha <= 0) this.explosions.splice(i, 1);
                }

                // Update floating texts
                for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
                    const t = this.floatingTexts[i];
                    t.y -= 1.5; t.life -= 0.02;
                    if (t.life <= 0) this.floatingTexts.splice(i, 1);
                }

                // Update stars
                this.stars.forEach(s => {
                    s.y += s.speed;
                    if (s.y > 500) { s.y = 0; s.x = Math.random() * 800; }
                });

                // Spawn more aliens if set is getting thin
                this.alienSpawnTimer++;
                if (this.aliens.length < 2 && this.alienSpawnTimer > 60) {
                    this.alienSpawnTimer = 0;
                    this.generateTarget();
                    this.spawnAlienSet();
                }

                this.updatePowerupUI();
            }

            // ── RENDER ──
            render() {
                const ctx = this.ctx;
                const W = this.canvas.width, H = this.canvas.height;

                // Background
                const bg = ctx.createLinearGradient(0, 0, 0, H);
                bg.addColorStop(0, '#000428');
                bg.addColorStop(1, '#1a237e');
                ctx.fillStyle = bg;
                ctx.fillRect(0, 0, W, H);

                // Stars
                this.stars.forEach(s => {
                    ctx.globalAlpha = 0.4 + Math.sin(Date.now() / 1000 + s.brightness * 10) * 0.3;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;

                // Aliens
                this.aliens.forEach(a => {
                    // Glow
                    ctx.shadowColor = a.isCorrect ? '#48bb78' : a.color;
                    ctx.shadowBlur = 10;

                    // UFO body
                    ctx.fillStyle = a.color;
                    ctx.beginPath();
                    ctx.ellipse(a.x + a.width / 2, a.y + a.height / 2, a.width / 2, a.height / 2, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Dome
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.beginPath();
                    ctx.ellipse(a.x + a.width / 2, a.y + a.height / 2 - 8, a.width / 3, a.height / 3, 0, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.shadowBlur = 0;

                    // Expression text
                    ctx.fillStyle = a.hitFlash > 0 ? '#ff4444' : '#ffffff';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(a.expression, a.x + a.width / 2, a.y + a.height / 2 + 5);
                });

                // Lasers
                this.lasers.forEach(l => {
                    ctx.fillStyle = '#ff3333';
                    ctx.shadowColor = '#ff0000';
                    ctx.shadowBlur = 8;
                    ctx.fillRect(l.x - 2, l.y, l.width, l.height);
                    ctx.shadowBlur = 0;
                });

                // Particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;

                // Explosions
                this.explosions.forEach(e => {
                    ctx.strokeStyle = `rgba(255, 165, 0, ${e.alpha})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                    ctx.stroke();
                });

                // Floating texts
                this.floatingTexts.forEach(t => {
                    ctx.globalAlpha = t.life;
                    ctx.fillStyle = t.color;
                    ctx.font = 'bold 18px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(t.text, t.x, t.y);
                });
                ctx.globalAlpha = 1;

                // Cannon
                ctx.fillStyle = '#4299e1';
                ctx.shadowColor = '#3182ce';
                ctx.shadowBlur = 10;
                ctx.fillRect(this.cannon.x - 20, this.cannon.y, 40, 16);
                ctx.fillStyle = '#2b6cb0';
                ctx.fillRect(this.cannon.x - 3, this.cannon.y - 18, 6, 18);
                ctx.shadowBlur = 0;

                // Shield indicator around cannon
                if (this.hasShield) {
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.cannon.x, this.cannon.y + 5, 30, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // HUD on canvas: target number + difficulty
                if (this.isRunning && !this.gameOver) {
                    // Target badge
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    const targetText = this._currentAIQuestion ?
                        this._currentAIQuestion.question : String(this.targetNumber);
                    const tw = Math.max(240, ctx.measureText(targetText).width + 40);
                    ctx.fillRect(W / 2 - tw / 2, 5, tw, 40);
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 11px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(this._currentAIQuestion ? 'QUESTION:' : 'TARGET:', W / 2, 18);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 16px Arial';
                    ctx.fillText(targetText, W / 2, 38);

                    // Difficulty badge
                    const diffColors = { easy: '#48bb78', medium: '#ecc94b', hard: '#f56565' };
                    ctx.fillStyle = diffColors[this.currentDifficulty];
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'left';
                    ctx.fillText(this.currentDifficulty.toUpperCase(), 10, 20);

                    // AI badge
                    if (this.aiTopic) {
                        ctx.fillStyle = '#9f7aea';
                        ctx.font = 'bold 10px Arial';
                        ctx.fillText('🤖 AI: ' + (this.aiTopic.topicLabel || ''), 10, 36);
                    }

                    // Score
                    ctx.fillStyle = '#00ffff';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'right';
                    ctx.fillText(`⭐ ${this.score}`, W - 10, 20);

                    // AI Hint popup
                    if (this.aiHintTimer > 0) {
                        this.aiHintTimer--;
                        const alpha = Math.min(1, this.aiHintTimer / 30);
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = 'rgba(26, 32, 44, 0.92)';
                        ctx.fillRect(40, H - 80, W - 80, 65);
                        ctx.strokeStyle = '#ffd700';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(40, H - 80, W - 80, 65);
                        ctx.fillStyle = '#fefcbf';
                        ctx.font = '13px Arial';
                        ctx.textAlign = 'center';
                        // Word-wrap hint
                        const words = this.aiHintText.split(' ');
                        let line = '', lineY = H - 58;
                        words.forEach(w => {
                            const test = line + w + ' ';
                            if (ctx.measureText(test).width > W - 110) {
                                ctx.fillText(line.trim(), W / 2, lineY);
                                line = w + ' ';
                                lineY += 18;
                            } else { line = test; }
                        });
                        if (line) ctx.fillText(line.trim(), W / 2, lineY);
                        ctx.globalAlpha = 1;
                    }
                }

                // Start screen
                if (!this.isRunning && !this.gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.75)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 36px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('🛸 ALIEN MATH BLASTER', W / 2, H / 2 - 30);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '16px Arial';
                    ctx.fillText('← → to move | SPACE to shoot', W / 2, H / 2 + 10);
                    ctx.fillText('Shoot aliens whose multiplication = target!', W / 2, H / 2 + 35);
                    ctx.fillStyle = '#48bb78';
                    ctx.font = 'bold 18px Arial';
                    ctx.fillText('Press "Start Game" →', W / 2, H / 2 + 70);
                }

                // Game Over
                if (this.gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.88)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#f56565';
                    ctx.font = 'bold 42px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', W / 2, 80);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '18px Arial';
                    const acc = this.shotsFired > 0 ? Math.round(this.shotsHit / this.shotsFired * 100) : 0;
                    ctx.fillText(`Score: ${this.score}  |  Accuracy: ${acc}%  |  Streak: ${this.maxStreak}`, W / 2, 120);

                    // AI Report
                    if (this.aiReportText) {
                        ctx.fillStyle = 'rgba(102, 126, 234, 0.15)';
                        ctx.fillRect(30, 145, W - 60, H - 220);
                        ctx.strokeStyle = '#667eea';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(30, 145, W - 60, H - 220);

                        ctx.fillStyle = '#9f7aea';
                        ctx.font = 'bold 14px Arial';
                        ctx.fillText('🤖 AI Performance Analysis', W / 2, 170);

                        ctx.fillStyle = '#e2e8f0';
                        ctx.font = '13px Arial';
                        // Word-wrap report
                        const words = this.aiReportText.split(' ');
                        let line = '', lineY = 195;
                        words.forEach(w => {
                            const test = line + w + ' ';
                            if (ctx.measureText(test).width > W - 100) {
                                ctx.fillText(line.trim(), W / 2, lineY);
                                line = w + ' ';
                                lineY += 20;
                            } else { line = test; }
                        });
                        if (line) ctx.fillText(line.trim(), W / 2, lineY);
                    } else {
                        ctx.fillStyle = '#a0aec0';
                        ctx.font = '14px Arial';
                        ctx.fillText('🤖 Loading AI analysis...', W / 2, 180);
                    }

                    ctx.fillStyle = '#48bb78';
                    ctx.font = 'bold 16px Arial';
                    ctx.fillText('Press Reset to try again!', W / 2, H - 30);
                }

                // Pause
                if (this.isPaused) {
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 36px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('⏸ PAUSED', W / 2, H / 2);
                }
            }

            gameLoop() {
                this.update();
                this.render();
                requestAnimationFrame(() => this.gameLoop());
            }

            // ── UI UPDATES ──
            updateStats() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('lives').textContent = this.lives;
                document.getElementById('streak').textContent = this.streakCount;
                const acc = this.shotsFired > 0 ? Math.round(this.shotsHit / this.shotsFired * 100) : 100;
                document.getElementById('accuracy').textContent = `${acc}%`;
                this.updateDiffBadge();
            }

            updateDiffBadge() {
                const badge = document.getElementById('diffBadge');
                const map = { easy: ['🟢 EASY', 'diff-easy'], medium: ['🟡 MEDIUM', 'diff-medium'], hard: ['🔴 HARD', 'diff-hard'] };
                const [text, cls] = map[this.currentDifficulty];
                badge.textContent = text;
                badge.className = 'diff-badge ' + cls;
            }

            updatePowerupUI() {
                document.getElementById('shieldIcon').className = 'powerup-icon' + (this.hasShield ? ' active' : '');
                document.getElementById('slowIcon').className = 'powerup-icon' + (this.slowMoActive ? ' active' : '');
            }

            // ── GAME CONTROL ──
            startGame() {
                if (this.isRunning) return;
                this.isRunning = true;
                this.isPaused = false;
                this.gameOver = false;
                this.score = 0;
                this.lives = 5;
                this.shotsFired = 0;
                this.shotsHit = 0;
                this.streakCount = 0;
                this.maxStreak = 0;
                this.consecutiveCorrect = 0;
                this.consecutiveWrong = 0;
                this.currentDifficulty = 'easy';
                this.hasShield = false;
                this.slowMoActive = false;
                this.aliens = [];
                this.lasers = [];
                this.explosions = [];
                this.particles = [];
                this.floatingTexts = [];

                this.generateTarget();
                this.spawnAlienSet();

                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                document.getElementById('targetBanner').style.display = 'block';
                this.updateStats();
            }

            pauseGame() {
                if (!this.isRunning || this.gameOver) return;
                this.isPaused = !this.isPaused;
                document.getElementById('pauseBtn').textContent = this.isPaused ? '▶️ Resume' : '⏸️ Pause';
            }

            resetGame() {
                this.isRunning = false;
                this.isPaused = false;
                this.gameOver = false;
                this.aliens = [];
                this.lasers = [];
                this.explosions = [];
                this.particles = [];
                this.floatingTexts = [];
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('pauseBtn').textContent = '⏸️ Pause';
                document.getElementById('targetBanner').style.display = 'none';
                this.score = 0;
                this.lives = 5;
                this.streakCount = 0;
                this.currentDifficulty = 'easy';
                this.hasShield = false;
                this.slowMoActive = false;
                this.updateStats();
            }

            endGame() {
                this.gameOver = true;
                this.isRunning = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
                this.fetchAIReport();
            }

            async fetchAIHint(alien) {
                try {
                    const res = await fetch('/api/ai_hint', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            question: this._currentAIQuestion?.question || `${this.targetNumber}`,
                            wrong_answer: String(alien.expression),
                            correct_answer: String(this._currentAIQuestion?.answer || this.targetNumber),
                            topic: this.aiTopic?.topicLabel || 'multiplication'
                        })
                    });
                    const data = await res.json();
                    if (data.success) {
                        this.aiHintText = '💡 ' + data.hint;
                        this.aiHintTimer = 250; // show for ~4 seconds
                    }
                } catch (e) { console.error('AI hint error:', e); }
            }

            async fetchAIReport() {
                try {
                    const res = await fetch('/api/ai_report', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            score: this.score,
                            total_questions: this.questionsAnswered,
                            correct: this.shotsHit,
                            wrong_answers: this.wrongAnswers.slice(-5),
                            difficulty_progression: this.difficultyHistory.join(' → '),
                            topic: this.aiTopic?.topicLabel || 'Multiplication',
                            max_streak: this.maxStreak,
                            game_name: 'Alien Math Blaster'
                        })
                    });
                    const data = await res.json();
                    if (data.success) {
                        this.aiReportText = data.report;
                    }
                } catch (e) { console.error('AI report error:', e); }
            }
        }

        let game;
        function startGame() { if (game) game.startGame(); }
        function pauseGame() { if (game) game.pauseGame(); }
        function resetGame() { if (game) game.resetGame(); }

        window.addEventListener('DOMContentLoaded', () => {
            game = new AlienGame();
        });
    </script>
</body>
